#
##this property tell hibernate: 
##Whenever my app starts,
## look at my @Entity classes and 
## automatically update the database tables to match them.
#
#spring.jpa.hibernate.ddl-auto=update
#
##/*
##When the Spring Boot application starts, Hibernate checks the entity classes
##and updates the database schema accordingly.
##
##- Creates tables if they do not already exist
##- Adds new columns when new fields are added to an entity
##- Does not delete existing columns
##- Does not drop existing tables
##
##Existing data in the database is preserved.
##*/
#
#
#spring.jpa.defer-datasource-initialization=true


# Database Connection URL (replace 'your_db_name' with your actual schema name)
spring.datasource.url=jdbc:mysql://localhost:3306/ecomdb

# Database Credentials
spring.datasource.username=root
spring.datasource.password=root

# MySQL JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update keeps your data, create-drop wipes it on restart)
spring.jpa.hibernate.ddl-auto=update

# Optional: Show SQL queries in the console for debugging
spring.jpa.show-sql=true